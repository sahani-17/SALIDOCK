<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/ngl@2.0.0-dev.37/dist/ngl.js"></script>
    <style>
        #viewport { width: 100%; height: 600px; }
        .controls { margin: 10px; }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <div class="controls">
        <button onclick="exportHighRes()">Export 300 DPI</button>
        <button onclick="showInteractions()">Show Interactions</button>
        <button onclick="toggleSurface()">Toggle Surface</button>
    </div>

    <script>
        var stage = new NGL.Stage("viewport", {
            backgroundColor: "white",
            quality: "high",
            sampleLevel: 2,  // Anti-aliasing
            ambientIntensity: 0.3,
            lightIntensity: 1.0
        });

        var proteinComp, ligandComp;

        // Load your docked structure
        stage.loadFile("{{ pdb_file }}").then(function(o) {
            
            // Protein - cartoon representation
            proteinComp = o.addRepresentation("cartoon", {
                color: "chainname",
                quality: "high",
                smoothSheet: true
            });
            
            // Ligand - ball+stick
            ligandComp = o.addRepresentation("ball+stick", {
                sele: "hetero and not water",  // Ligand selection
                colorScheme: "element",
                colorValue: "yellow",
                quality: "high",
                aspectRatio: 2.0,
                radius: 0.15
            });
            
            // Binding site residues - licorice
            o.addRepresentation("licorice", {
                sele: "within 5 of (hetero and not water)",
                colorScheme: "element",
                quality: "high"
            });
            
            // Hydrogen bonds
            o.addRepresentation("contact", {
                sele: "hetero and not water",
                filterSele: "protein",
                contactType: "hydrogen-bond",
                labelVisible: true,
                labelUnit: "angstrom",
                color: "yellow",
                radius: 0.1
            });
            
            // Hydrophobic contacts
            o.addRepresentation("contact", {
                sele: "hetero and not water",
                filterSele: "protein",
                contactType: "hydrophobic",
                color: "grey",
                radius: 0.07
            });
            
            // Auto-center on ligand
            o.autoView("hetero and not water");
            stage.setSpin(false);
        });

        // Export high-resolution image (300 DPI equivalent)
        function exportHighRes() {
            stage.makeImage({
                factor: 8,              // 8x resolution multiplier
                antialias: true,        // Smooth edges
                trim: false,            // Keep full canvas
                transparent: false,     // White background for publication
                width: 3000,           // Width in pixels
                height: 3000           // Height in pixels
            }).then(function(blob) {
                NGL.download(blob, "structure_300dpi.png");
            });
        }

        // Show/hide interactions
        function showInteractions() {
            stage.getRepresentationsByName("contact").list.forEach(function(repr) {
                repr.setVisibility(!repr.visible);
            });
        }

        // Toggle surface
        var surfaceVisible = false;
        function toggleSurface() {
            if (!surfaceVisible) {
                stage.getComponentsByName("*").list[0].addRepresentation("surface", {
                    sele: "protein",
                    opacity: 0.3,
                    color: "electrostatic",
                    surfaceType: "av"
                });
            } else {
                stage.getRepresentationsByName("surface").dispose();
            }
            surfaceVisible = !surfaceVisible;
        }

        // Spin control
        stage.setSpin([0, 1, 0], 0.01);
    </script>
</body>
</html>
