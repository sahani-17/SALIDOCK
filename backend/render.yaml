services:
  - type: web
    name: salidock-backend
    runtime: docker
    rootDir: backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CLOUD_ONLY_MODE
        value: "true"
      - key: SUPABASE_STORAGE_BUCKET
        value: docking-results
      - key: SESSION_EXPIRY
        value: "6"
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false